<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luiz Seabra | AI Engineer</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
:root {
    --accent:#0071e3;
    --bg:#f5f5f7;
    --card:#ffffff;
    --text-main:#1d1d1f;
    --text-muted:#6e6e73;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
    font-family:'Inter', sans-serif;
    background:var(--bg);
    padding:40px 20px;
}

/* HEADER */
.header {
    max-width:1000px;
    margin:auto;
    margin-bottom:30px;
}

h1 { font-size:36px; }

.subtitle {
    font-size:18px;
    color:var(--text-muted);
    margin-top:6px;
}

.contact {
    margin-top:10px;
    font-size:14px;
    color:var(--text-muted);
}

/* BUTTONS */
.top-actions {
    position:fixed;
    top:20px;
    right:20px;
    display:flex;
    gap:10px;
}

.btn {
    border:none;
    padding:10px 16px;
    border-radius:20px;
    cursor:pointer;
}

.btn-primary {
    background:var(--accent);
    color:white;
}

.btn-secondary {
    background:#e5e5ea;
}

/* CONTAINER */
.container {
    max-width:1000px;
    margin:auto;
}

/* SECTIONS */
section { margin-top:40px; }

h2 {
    font-size:13px;
    text-transform:uppercase;
    color:var(--accent);
    margin-bottom:16px;
}

/* SUMMARY */
.summary {
    font-size:16px;
    color:var(--text-muted);
    line-height:1.6;
}

/* SKILLS */
.skills {
    display:flex;
    flex-wrap:wrap;
}

.skills span {
    background:#e5e5ea;
    padding:6px 12px;
    margin:5px;
    border-radius:20px;
    font-size:13px;
}

/* GRID */
.grid {
    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(280px, 1fr));
    gap:20px;
}

/* CARD */
.card {
    background:var(--card);
    padding:20px;
    border-radius:12px;
    box-shadow:0 4px 16px rgba(0,0,0,0.06);
    transition:0.2s;
}

.card:hover {
    transform:translateY(-4px);
}

.card h3 {
    font-size:16px;
}

.card span {
    font-size:13px;
    color:var(--text-muted);
}

.card ul {
    margin-top:10px;
    padding-left:16px;
}

.card li {
    font-size:14px;
    margin-bottom:6px;
}

/* EDUCATION */
.simple-item {
    display:flex;
    justify-content:space-between;
}

/* PRINT */
@media print {
    .top-actions { display:none; }
    body { background:none; }
}
</style>
</head>

<body>

<div class="top-actions">
<button class="btn btn-secondary" onclick="toggleLang()">EN / PT</button>
<button class="btn btn-primary" onclick="window.print()">PDF</button>
</div>

<div class="header">
<h1 data-en="Luiz Seabra de Marco" data-pt="Luiz Seabra de Marco"></h1>

<div class="subtitle"
data-en="AI Engineer & Full Stack Developer"
data-pt="Engenheiro de IA & Desenvolvedor Full Stack">
</div>

<div class="contact">
Rio de Janeiro • linkedin • github
</div>
</div>

<div class="container">

<section>
<h2 data-en="Summary" data-pt="Resumo"></h2>
<p class="summary"
data-en="AI Engineer and Full Stack Developer building real-world systems with Machine Learning and web technologies. Creator of open-source tools used in 60+ countries."
data-pt="Engenheiro de IA e Desenvolvedor Full Stack focado em sistemas reais com Machine Learning e tecnologias web. Criador de ferramentas utilizadas em mais de 60 países.">
</p>
</section>

<section>
<h2 data-en="Skills" data-pt="Habilidades"></h2>
<div class="skills">
<span>Python</span>
<span>JavaScript</span>
<span>React</span>
<span>Node.js</span>
<span>Machine Learning</span>
<span>Computer Vision</span>
<span>APIs</span>
<span>SQL</span>
</div>
</section>

<section>
<h2 data-en="Projects" data-pt="Projetos"></h2>

<div class="grid">

<div class="card">
<h3>CycloCred</h3>
<span>AI Startup</span>
<ul>
<li data-en="AI system for carbon credit automation"
    data-pt="Sistema de IA para automação de créditos de carbono"></li>
<li data-en="Projected R$10k+ value"
    data-pt="Projeção de mais de R$10k"></li>
</ul>
</div>

<div class="card">
<h3>Eco Ação</h3>
<span>UN Supported</span>
<ul>
<li data-en="AI for environmental impact analysis"
    data-pt="IA para análise de impacto ambiental"></li>
<li data-en="US$50,000 funding support"
    data-pt="Apoio financeiro de US$50.000"></li>
</ul>
</div>

<div class="card">
<h3>Nano-Wait</h3>
<span>Open Source</span>
<ul>
<li data-en="16k+ downloads in 60+ countries"
    data-pt="16k+ downloads em 60+ países"></li>
<li data-en="Automation & computer vision tools"
    data-pt="Ferramentas de automação e visão computacional"></li>
</ul>
</div>

<div class="card">
<h3>AI Critic</h3>
<span>AI Tool</span>
<ul>
<li data-en="Released in under 6 months"
    data-pt="Desenvolvido em menos de 6 meses"></li>
<li data-en="10k+ downloads"
    data-pt="Mais de 10k downloads"></li>
</ul>
</div>

</div>

</section>

<section>
<h2 data-en="Education" data-pt="Educação"></h2>
<div class="simple-item">
<span data-en="High School — Brazil" data-pt="Ensino Médio — Brasil"></span>
<span>2026</span>
</div>
</section>

</div>

<script>
let lang = "en";

function toggleLang(){
    lang = lang === "en" ? "pt" : "en";
    document.querySelectorAll("[data-en]").forEach(el=>{
        el.innerHTML = el.getAttribute("data-" + lang);
    });
}

toggleLang();
</script>

</body>
</html>
